name: Add Custom Domain

on:
  workflow_dispatch:

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel project config
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Add domain via Vercel CLI
        run: |
          echo "=== Linking domain to project ==="
          vercel domains add supplychain.initialestate.com --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true

          echo ""
          echo "=== Assigning domain to this project ==="
          vercel alias set --domain supplychain.initialestate.com --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true

          echo ""
          echo "=== Current project domains ==="
          PROJECT_ID=$(python3 -c "import json; d=json.load(open('.vercel/project.json')); print(d['projectId'])")
          ORG_ID=$(python3 -c "import json; d=json.load(open('.vercel/project.json')); print(d['orgId'])")
          echo "Project: $PROJECT_ID  Org: $ORG_ID"

          curl -sS "https://api.vercel.com/v10/projects/$PROJECT_ID/domains" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | python3 -m json.tool 2>/dev/null || true
