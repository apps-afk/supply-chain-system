# Manual break-glass workflow: reset an account's password in production and
# make sure NEXTAUTH_SECRET is set. Runs ONLY when a repo member triggers it
# by hand (workflow_dispatch) — never automatically.
#
# How it works (Supabase creds are marked Sensitive in Vercel, so they can't
# be pulled to CI — the reset must happen INSIDE the running app instead):
#   1. generate a random MAINTENANCE_TOKEN (never logged) and add it to the
#      Vercel env, deploy → the /api/maintenance/reset-password endpoint,
#      which is a 404 in normal operation, becomes callable with that token
#   2. call it once with the temp password from the workflow input
#   3. remove MAINTENANCE_TOKEN and deploy again → endpoint is dead again
name: Admin password reset (manual)

on:
  workflow_dispatch:
    inputs:
      temp_password:
        description: 'Temporary password to set (>=10 chars) — change it right after logging in'
        required: true
      target_email:
        description: 'Account to reset'
        required: false
        default: 'pasit@initialestate.com'

env:
  SITE_URL: https://supplychain.initialestate.com

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g vercel

      - name: Ensure NEXTAUTH_SECRET exists (generated, never logged)
        run: |
          if vercel env ls production --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null | grep -q 'NEXTAUTH_SECRET'; then
            echo "NEXTAUTH_SECRET already set — leaving as is"
          else
            node -e "process.stdout.write(require('crypto').randomBytes(48).toString('base64url'))" \
              | vercel env add NEXTAUTH_SECRET production --token=${{ secrets.VERCEL_TOKEN }}
            echo "NEXTAUTH_SECRET created (everyone re-logs-in once)"
          fi

      - name: Arm maintenance mode (add one-time token)
        run: |
          TOKEN=$(node -e "process.stdout.write(require('crypto').randomBytes(32).toString('base64url'))")
          echo "::add-mask::$TOKEN"
          echo "MAINT_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          printf '%s' "$TOKEN" | vercel env add MAINTENANCE_TOKEN production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy with maintenance mode armed
        run: |
          vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Reset the password via the running app
        env:
          TEMP_PASSWORD: ${{ inputs.temp_password }}
          TARGET_EMAIL: ${{ inputs.target_email }}
        run: |
          set -o pipefail
          BODY=$(node -e "console.log(JSON.stringify({ email: process.env.TARGET_EMAIL, password: process.env.TEMP_PASSWORD }))")
          for i in 1 2 3; do
            CODE=$(curl -s -o /tmp/reset-out.txt -w "%{http_code}" -X POST "$SITE_URL/api/maintenance/reset-password" \
              -H "Content-Type: application/json" \
              -H "x-maintenance-token: $MAINT_TOKEN" \
              -d "$BODY")
            echo "attempt $i → HTTP $CODE"
            [ "$CODE" = "200" ] && break
            sleep 20
          done
          cat /tmp/reset-out.txt
          [ "$CODE" = "200" ]

      - name: Disarm maintenance mode (always — even on failure)
        if: always()
        run: |
          vercel env rm MAINTENANCE_TOKEN production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
          vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Report outcome as commit comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUT=$(cat /tmp/reset-out.txt 2>/dev/null || echo 'no output')
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body="admin-reset outcome (${{ job.status }}): $OUT" || true
