name: Setup Supabase + Vercel

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Test Supabase connection
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "=== Hit Supabase REST root ==="
          CODE=$(curl -sS -o /tmp/r.txt -w "%{http_code}" "$URL/rest/v1/" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "HTTP $CODE"
          if [ "$CODE" -ge 400 ]; then
            cat /tmp/r.txt
            echo "::error::Cannot reach Supabase REST API. Check URL/KEY."
            exit 1
          fi

      - name: Check 'users' table exists
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          CODE=$(curl -sS -o /tmp/r.txt -w "%{http_code}" \
            "$URL/rest/v1/users?select=count" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "users → HTTP $CODE"
          if [ "$CODE" = "404" ] || grep -q "does not exist\|relation .* does not exist" /tmp/r.txt 2>/dev/null; then
            echo ""
            echo "::error::Table 'users' does NOT exist yet."
            echo "::error::Please open Supabase Dashboard → SQL Editor → paste contents of supabase/schema.sql → Run."
            echo ""
            echo "Schema file is at: supabase/schema.sql in this repo."
            exit 1
          fi
          if [ "$CODE" -ge 400 ]; then
            cat /tmp/r.txt
            exit 1
          fi
          echo "  Tables exist ✓"

      - name: Pull Vercel project config
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Add Supabase env vars to Vercel
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VTOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          add_env() {
            local key="$1"
            local val="$2"
            echo "Adding $key to Vercel..."
            # Use vercel CLI — it idempotently creates env vars for all targets
            for tgt in production preview development; do
              # Remove existing if present (ignore error if not), then add fresh
              vercel env rm "$key" "$tgt" --yes --token="$VTOKEN" 2>/dev/null || true
              echo -n "$val" | vercel env add "$key" "$tgt" --token="$VTOKEN" >/dev/null 2>&1 || \
                echo "  Note: $tgt target may have failed"
            done
            echo "  Done $key"
          }

          add_env "NEXT_PUBLIC_SUPABASE_URL" "$URL"
          add_env "SUPABASE_SERVICE_KEY" "$KEY"

          echo ""
          echo "=== Verify env vars present ==="
          vercel env ls --token="$VTOKEN" 2>&1 | grep -E "SUPABASE|NEXT_PUBLIC" || echo "(none matched)"

      - name: Redeploy to production
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
