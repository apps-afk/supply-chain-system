name: Setup Supabase + Vercel + Seed Admin

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Test Supabase connection
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "=== Hit Supabase REST root ==="
          CODE=$(curl -sS -o /tmp/r.txt -w "%{http_code}" "$URL/rest/v1/" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "HTTP $CODE"
          if [ "$CODE" -ge 400 ]; then
            cat /tmp/r.txt
            echo "::error::Cannot reach Supabase REST API. Check URL/KEY."
            exit 1
          fi

      - name: Check 'users' table exists
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          CODE=$(curl -sS -o /tmp/r.txt -w "%{http_code}" \
            "$URL/rest/v1/users?select=count" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "users → HTTP $CODE"
          if [ "$CODE" = "404" ] || grep -q "does not exist" /tmp/r.txt 2>/dev/null; then
            echo ""
            echo "::error::Table 'users' does NOT exist. Run supabase/schema.sql in Supabase SQL Editor first."
            exit 1
          fi
          if [ "$CODE" -ge 400 ]; then
            cat /tmp/r.txt
            exit 1
          fi
          echo "  Tables exist ✓"

      - name: Seed admin user pasit@initialestate.com
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Hash matches the app's algorithm: sha256(salt + password)
          EMAIL="pasit@initialestate.com"
          NAME="pasit suepaisal"
          PASSWORD="Pasit.suepasial1"
          SALT="ie_pasit_$(openssl rand -hex 8)"
          HASH=$(printf "%s%s" "$SALT" "$PASSWORD" | sha256sum | awk '{print $1}')
          USER_ID="user_pasit_$(date +%s)"

          BODY=$(python3 -c "
          import json
          print(json.dumps({
            'id': '$USER_ID',
            'email': '$EMAIL',
            'name': '$NAME',
            'role': 'admin',
            'salt': '$SALT',
            'hash': '$HASH',
            'verified': True,
            'phone': ''
          }))
          ")

          echo "Upserting user $EMAIL with id=$USER_ID"
          # Use upsert so re-running the workflow doesn't fail on duplicate email.
          # on_conflict=email merges into the existing row.
          CODE=$(curl -sS -o /tmp/up.txt -w "%{http_code}" \
            -X POST "$URL/rest/v1/users?on_conflict=email" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$BODY")
          echo "HTTP $CODE"
          cat /tmp/up.txt
          if [ "$CODE" -ge 400 ]; then
            echo "::error::Failed to seed user"
            exit 1
          fi

          echo ""
          echo "=== Verify user exists ==="
          curl -sS "$URL/rest/v1/users?email=eq.$EMAIL&select=id,email,name,role" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY"
          echo ""

      - name: Pull Vercel project config
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Add Supabase env vars to Vercel
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VTOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          add_env() {
            local key="$1"
            local val="$2"
            echo "Adding $key..."
            for tgt in production preview development; do
              vercel env rm "$key" "$tgt" --yes --token="$VTOKEN" 2>/dev/null || true
              echo -n "$val" | vercel env add "$key" "$tgt" --token="$VTOKEN" 2>&1 \
                | grep -v "^$" || true
            done
          }
          add_env "NEXT_PUBLIC_SUPABASE_URL" "$URL"
          add_env "SUPABASE_SERVICE_KEY" "$KEY"

          echo ""
          echo "=== Env vars now set ==="
          vercel env ls --token="$VTOKEN" 2>&1 | grep -E "SUPABASE|NEXT_PUBLIC" || echo "(none matched)"

      - name: Redeploy to production
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
